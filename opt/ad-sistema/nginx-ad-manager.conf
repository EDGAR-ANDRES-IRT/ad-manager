# /etc/nginx/sites-available/ad-manager

server {
    listen 80;
    server_name _;          # Cambia por tu IP o dominio si lo tienes

    # ── Frontend PHP ──────────────────────────────────────────
    root /var/www/html/ad-manager;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include        snippets/fastcgi-php.conf;
        fastcgi_pass   unix:/run/php/php8.3-fpm.sock;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include        fastcgi_params;
    }

    # Bloquear acceso a archivos sensibles
    location ~ /\.(ht|sql|env|md) {
        deny all;
    }
    location ~ ^/(config|includes)/ {
        deny all;
    }

    # ── API Flask (proxy inverso) ──────────────────────────────
    # El frontend PHP hace fetch a /api/... y nginx lo redirige a Flask
    location /api/ {
        proxy_pass         http://127.0.0.1:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }
}
